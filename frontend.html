<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OCR Emotion & Speech</title>

<style>
    body {
        font-family: "Poppins", sans-serif;
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #d9a7c7, #fffcdc);
    }

    .container {
        width: 420px;
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(15px);
        border-radius: 25px;
        padding: 40px 40px;
        text-align: center;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        animation: popIn 0.5s ease;
    }

    @keyframes popIn {
        from { transform: scale(0.85); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    h2 {
        font-size: 26px;
        margin-bottom: 8px;
        color: #5b21b6;
        font-weight: 700;
    }

    p {
        color: #4a4a4a;
        font-size: 15px;
    }

    input {
        width: 90%;
        padding: 12px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        margin-top: 12px;
        outline: none;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: inset 0 0 5px rgba(0,0,0,0.08);
    }

    button {
        margin-top: 18px;
        width: 90%;
        padding: 12px;
        border: none;
        background: linear-gradient(135deg, #6d28d9, #4f46e5);
        color: white;
        font-size: 17px;
        font-weight: 600;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.25s ease;
    }

    button:hover {
        transform: scale(1.04);
        background: linear-gradient(135deg, #4f46e5, #6d28d9);
    }

    #result {
        margin-top: 25px;
        text-align: left;
        line-height: 1.7;
        font-size: 15px;
        color: #333;
    }

    audio {
        width: 100%;
        margin-top: 12px;
    }

    .download-btn {
        display: block;
        text-align: center;
        margin-top: 10px;
        text-decoration: none;
        font-weight: 600;
        background: #10b981;
        color: white;
        padding: 10px 15px;
        border-radius: 12px;
        transition: 0.3s;
    }

    .download-btn:hover {
        background: #059669;
        transform: scale(1.03);
    }

</style>
</head>
<body>

<div class="container">
    <h2>🎙️ Image to Emotional Speech</h2>
    <p>Enter image name:</p>

    <input type="text" id="imageName" placeholder="image...">

    <p style="margin-top:15px;">Or Upload an Image:</p>
    <input type="file" id="imageFile" accept="image/*">

    <button onclick="runBackend()">Submit</button>

    <div id="result"></div>
</div>


<script>
// Clear text if file selected
document.getElementById("imageFile").addEventListener("change", () => {
    document.getElementById("imageName").value = "";
});

// Clear file if text typed
document.getElementById("imageName").addEventListener("input", () => {
    document.getElementById("imageFile").value = "";
});


async function runBackend() {
    const imageName = document.getElementById("imageName").value.trim();
    const fileInput = document.getElementById("imageFile");
    const outputDiv = document.getElementById("result");

    outputDiv.innerHTML = "<p>⏳ Processing... Please wait.</p>";

    let formData = new FormData();

    // If file uploaded → use that
    if (fileInput.files.length > 0) {
        formData.append("file", fileInput.files[0]);
    }
    // If typed name → send name
    else if (imageName) {
        formData.append("image_name", imageName);
    }
    else {
        outputDiv.innerHTML = "<p style='color:red;'>⚠️ Enter name or upload image.</p>";
        return;
    }

    // Call backend
    const response = await fetch("http://127.0.0.1:5000/run", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    if (data.error) {
        outputDiv.innerHTML = `<p style="color:red;">⚠️ ${data.error}</p>`;
        return;
    }

    outputDiv.innerHTML = `
        <p><b>📝 Extracted Text:</b> ${data.text}</p>
        <p><b>💬 Emotion:</b> ${data.emotion}</p>

        <audio controls>
            <source src="http://127.0.0.1:5000/${data.audio_file}" type="audio/mpeg">
        </audio>

        <a class="download-btn" href="http://127.0.0.1:5000/${data.audio_file}" download>
            ⬇️ Download Audio
        </a>
    `;
}
</script>

</body>
</html>
